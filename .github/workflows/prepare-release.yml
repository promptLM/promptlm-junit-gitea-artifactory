name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.2.3)"
        required: true
      auto_merge:
        description: "Enable auto-merge for the release PR"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Validate release version
        run: |
          RELEASE_VERSION="${{ inputs.release_version }}"
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must be MAJOR.MINOR.PATCH (e.g. 1.2.3)."
            exit 1
          fi
          CURRENT_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          CURRENT_BASE="${CURRENT_VERSION%-SNAPSHOT}"
          export RELEASE_VERSION CURRENT_BASE CURRENT_VERSION
          python - <<'PY'
          import os, sys
          def parse(v): return [int(x) for x in v.split(".")]
          cur = os.environ["CURRENT_BASE"]
          cur_version = os.environ["CURRENT_VERSION"]
          rel = os.environ["RELEASE_VERSION"]
          if parse(rel) < parse(cur):
              print(f"release_version {rel} must be greater than current version {cur}.")
              sys.exit(1)
          if parse(rel) == parse(cur) and not cur_version.endswith("-SNAPSHOT"):
              print(f"release_version {rel} must be greater than current version {cur}.")
              sys.exit(1)
          PY

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch and update version
        run: |
          RELEASE_VERSION="${{ inputs.release_version }}"
          BRANCH="release/v${RELEASE_VERSION}"
          git checkout -b "$BRANCH"
          ./mvnw -B org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion="${RELEASE_VERSION}" \
            -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "release: v${RELEASE_VERSION}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        id: prepare

      - name: Create release PR
        run: |
          RELEASE_VERSION="${{ inputs.release_version }}"
          PR_URL="$(gh pr create \
            --base main \
            --head "${{ steps.prepare.outputs.branch }}" \
            --title "release: v${RELEASE_VERSION}" \
            --body "Release ${RELEASE_VERSION}." \
            --label release)"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: ${{ inputs.auto_merge == true }}
        run: gh pr merge --auto --squash "${{ steps.pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
