name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.2.3)"
        required: true
      auto_merge:
        description: "Enable auto-merge for the release PR"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Validate release version
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ inputs.release_version }}"
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must be MAJOR.MINOR.PATCH (e.g. 1.2.3)."
            exit 1
          fi
          CURRENT_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          CURRENT_BASE="${CURRENT_VERSION%-SNAPSHOT}"
          if [[ "$RELEASE_VERSION" == "$CURRENT_BASE" ]]; then
            if [[ "$CURRENT_VERSION" != *-SNAPSHOT ]]; then
              echo "release_version $RELEASE_VERSION must be greater than current version $CURRENT_BASE."
              exit 1
            fi
            exit 0
          fi
          LOWEST="$(printf '%s\n%s\n' "$CURRENT_BASE" "$RELEASE_VERSION" | sort -V | head -n1)"
          if [[ "$LOWEST" != "$CURRENT_BASE" ]]; then
            echo "release_version $RELEASE_VERSION must be greater than current version $CURRENT_BASE."
            exit 1
          fi

      - name: Set release version
        run: |
          ./mvnw -B org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion="${{ inputs.release_version }}" \
            -DgenerateBackupPoms=false

      - name: Create release PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "release: v${{ inputs.release_version }}"
          title: "release: v${{ inputs.release_version }}"
          body: "Release ${{ inputs.release_version }}."
          labels: release
          branch: "release/v${{ inputs.release_version }}"
          base: main

      - name: Enable auto-merge
        if: ${{ inputs.auto_merge == true }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
