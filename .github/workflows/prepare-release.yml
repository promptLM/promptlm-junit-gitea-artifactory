name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.2.3)"
        required: true
      auto_merge:
        description: "Enable auto-merge for the release PR"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Validate release version
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ inputs.release_version }}"
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must be MAJOR.MINOR.PATCH (e.g. 1.2.3)."
            exit 1
          fi
          CURRENT_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          CURRENT_BASE="${CURRENT_VERSION%-SNAPSHOT}"
          if [[ "$RELEASE_VERSION" == "$CURRENT_BASE" ]]; then
            if [[ "$CURRENT_VERSION" != *-SNAPSHOT ]]; then
              echo "release_version $RELEASE_VERSION must be greater than current version $CURRENT_BASE."
              exit 1
            fi
            exit 0
          fi
          LOWEST="$(printf '%s\n%s\n' "$CURRENT_BASE" "$RELEASE_VERSION" | sort -V | head -n1)"
          if [[ "$LOWEST" != "$CURRENT_BASE" ]]; then
            echo "release_version $RELEASE_VERSION must be greater than current version $CURRENT_BASE."
            exit 1
          fi
          TAG="v${RELEASE_VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Release tag ${TAG} already exists on origin. Rerun the Release workflow for that tag instead of preparing a new release PR."
            exit 1
          fi
          GROUP_ID="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.groupId)"
          ARTIFACT_ID="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.artifactId)"
          GROUP_PATH="$(printf '%s' "$GROUP_ID" | tr '.' '/')"
          ARTIFACT_URL="https://repo.maven.apache.org/maven2/${GROUP_PATH}/${ARTIFACT_ID}/${RELEASE_VERSION}/${ARTIFACT_ID}-${RELEASE_VERSION}.pom"
          if curl --silent --fail --head "$ARTIFACT_URL" >/dev/null; then
            echo "Release ${GROUP_ID}:${ARTIFACT_ID}:${RELEASE_VERSION} is already published on Maven Central. Rerun the Release workflow for tag ${TAG} only if you need to recover post-release steps."
            exit 1
          fi

      - name: Set release version
        run: |
          ./mvnw -B org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion="${{ inputs.release_version }}" \
            -DgenerateBackupPoms=false

      - name: Create release PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "release: v${{ inputs.release_version }}"
          title: "release: v${{ inputs.release_version }}"
          body: "Release ${{ inputs.release_version }}."
          labels: release
          branch: "release/v${{ inputs.release_version }}"
          base: main

      - name: Enable auto-merge
        if: ${{ inputs.auto_merge == true }}
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d
        with:
          token: ${{ secrets.GH_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
