name: release-please

# Single dispatcher: release-please opens/updates a rolling "release PR" that
# bumps pom.xml and rewrites CHANGELOG.md from Conventional Commits. Merging
# the PR tags vX.Y.Z, which gates the publish job below — which delegates to
# the org-wide reusable release-java-central workflow.
#
# Replaces: prepare-release.yml, tag-release.yml, and the inline build/sign/
# deploy/promote/release-notes jobs currently in release.yml.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      version:         ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@5792afc6b46e9bb55deda9eda973a18c226bc3fc # v4.1.5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

